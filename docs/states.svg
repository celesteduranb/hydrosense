<svg width="680" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Arial, sans-serif">
  <title>HydroSense - Diagrama de estados del firmware</title>
  <desc>Maquina de estados del firmware ESP32: inicio, conectando WiFi, leyendo sensores, decision por umbral, alerta push, riego automatico y espera en deep sleep.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#c0452a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1a6fa8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ══════════════ INICIO ══════════════ -->
  <rect x="285" y="18" width="110" height="40" rx="20"
        fill="#d9d7cf" stroke="#6b6963" stroke-width="1"/>
  <text x="340" y="43" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c2c2a">Inicio</text>

  <line x1="340" y1="58" x2="340" y2="90" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="346" y="79" font-size="10" fill="#555">Power on / reset</text>

  <!-- ══════════════ CONECTANDO ══════════════ -->
  <rect x="230" y="90" width="220" height="58" rx="8"
        fill="#fae6c0" stroke="#c08010" stroke-width="1"/>
  <text x="340" y="114" text-anchor="middle" font-size="13" font-weight="bold" fill="#6b4400">Conectando</text>
  <text x="340" y="131" text-anchor="middle" font-size="11" fill="#8a5a10">WiFi + broker MQTT</text>
  <text x="340" y="145" text-anchor="middle" font-size="11" fill="#8a5a10">Reintentos con backoff</text>

  <line x1="340" y1="148" x2="340" y2="182" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="346" y="170" font-size="10" fill="#2d8f67">Conexion OK</text>

  <!-- ══════════════ LEYENDO ══════════════ -->
  <rect x="230" y="182" width="220" height="58" rx="8"
        fill="#a3dcc4" stroke="#1a7a56" stroke-width="1.2"/>
  <text x="340" y="206" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d4030">Leyendo sensores</text>
  <text x="340" y="222" text-anchor="middle" font-size="11" fill="#1a5c42">Promedio de 20 muestras ADC</text>
  <text x="340" y="238" text-anchor="middle" font-size="11" fill="#1a5c42">Mapeo a porcentaje 0–100 %</text>

  <line x1="340" y1="240" x2="340" y2="276" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ══════════════ DECISION ══════════════ -->
  <polygon points="340,276 440,310 340,344 240,310"
           fill="#f5f4f0" stroke="#555" stroke-width="1.2"/>
  <text x="340" y="307" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c2c2a">Humedad</text>
  <text x="340" y="322" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c2c2a">medida?</text>

  <!-- Arrow left => ALERTA -->
  <line x1="240" y1="310" x2="170" y2="310" stroke="#c0452a" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="200" y="302" text-anchor="middle" font-size="10" fill="#c0452a">Baja</text>
  <text x="200" y="314" text-anchor="middle" font-size="10" fill="#888">(modo alerta)</text>

  <!-- Arrow right => RIEGO -->
  <line x1="440" y1="310" x2="510" y2="310" stroke="#1a6fa8" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="470" y="302" text-anchor="middle" font-size="10" fill="#1a6fa8">Baja</text>
  <text x="470" y="314" text-anchor="middle" font-size="10" fill="#888">(modo auto)</text>

  <!-- Arrow down => ESPERA -->
  <line x1="340" y1="344" x2="340" y2="388" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="346" y="372" font-size="10" fill="#2d8f67">Normal / OK</text>

  <!-- ══════════════ ALERTA ══════════════ -->
  <rect x="42" y="282" width="128" height="58" rx="8"
        fill="#fcddd5" stroke="#c0452a" stroke-width="1"/>
  <text x="106" y="306" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a2010">Alerta</text>
  <text x="106" y="322" text-anchor="middle" font-size="11" fill="#9e3520">Notificacion push</text>
  <text x="106" y="337" text-anchor="middle" font-size="11" fill="#9e3520">Log en Firebase</text>

  <!-- ══════════════ RIEGO AUTO ══════════════ -->
  <rect x="510" y="282" width="130" height="58" rx="8"
        fill="#b8d9f4" stroke="#1a6fa8" stroke-width="1"/>
  <text x="575" y="306" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d3d6b">Riego auto</text>
  <text x="575" y="322" text-anchor="middle" font-size="11" fill="#1a5494">Bomba activada</text>
  <text x="575" y="337" text-anchor="middle" font-size="11" fill="#1a5494">Max 30 s</text>

  <!-- ══════════════ ESPERA ══════════════ -->
  <rect x="230" y="388" width="220" height="58" rx="8"
        fill="#d9d7cf" stroke="#6b6963" stroke-width="1"/>
  <text x="340" y="412" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c2c2a">Espera</text>
  <text x="340" y="428" text-anchor="middle" font-size="11" fill="#444441">Deep sleep 5 min</text>
  <text x="340" y="444" text-anchor="middle" font-size="11" fill="#444441">Intervalo configurable</text>

  <!-- Arrow alerta -> espera -->
  <path d="M106 340 Q106 460 228 446" fill="none" stroke="#888" stroke-width="1.2" marker-end="url(#arrow-gray)"/>

  <!-- Arrow riego -> espera -->
  <path d="M575 340 Q575 462 452 446" fill="none" stroke="#888" stroke-width="1.2" marker-end="url(#arrow-gray)"/>

  <!-- Arrow espera -> leyendo (ciclo principal) -->
  <path d="M450 417 Q640 417 640 211 Q640 182 452 182" fill="none" stroke="#1a7a56" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrow)"/>
  <text x="648" y="305" font-size="11" fill="#1a7a56">Ciclo</text>
  <text x="648" y="319" font-size="11" fill="#1a7a56">cada</text>
  <text x="648" y="333" font-size="11" fill="#1a7a56">5 min</text>

</svg>
