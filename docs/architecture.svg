<svg width="680" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Arial, sans-serif">
  <title>HydroSense - Diagrama de arquitectura del sistema</title>
  <desc>Diagrama de bloques del sistema IoT de riego automatico, dividido en tres capas: hardware, nube y usuario.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1a6fa8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- HARDWARE LAYER                                          -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="30" y="20" width="620" height="160" rx="14"
        fill="#e8f6f0" stroke="#2d8f67" stroke-width="1"/>
  <text x="50" y="48" font-size="13" font-weight="bold" fill="#1a5c42">Hardware layer</text>

  <!-- Sensor 1 -->
  <rect x="55" y="62" width="120" height="96" rx="8"
        fill="#c6e9d8" stroke="#2d8f67" stroke-width="0.8"/>
  <text x="115" y="88"  text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5c42">Sensor 1</text>
  <text x="115" y="106" text-anchor="middle" font-size="11" fill="#2d6e52">Humedad del suelo</text>
  <text x="115" y="121" text-anchor="middle" font-size="11" fill="#2d6e52">YL-69 / capacitivo</text>
  <text x="115" y="136" text-anchor="middle" font-size="11" fill="#2d6e52">GPIO 34 (ADC1)</text>
  <text x="115" y="151" text-anchor="middle" font-size="11" fill="#2d6e52">0 – 4095 (12 bits)</text>

  <!-- Sensor 2 -->
  <rect x="195" y="62" width="120" height="96" rx="8"
        fill="#c6e9d8" stroke="#2d8f67" stroke-width="0.8"/>
  <text x="255" y="88"  text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5c42">Sensor 2</text>
  <text x="255" y="106" text-anchor="middle" font-size="11" fill="#2d6e52">Humedad del suelo</text>
  <text x="255" y="121" text-anchor="middle" font-size="11" fill="#2d6e52">YL-69 / capacitivo</text>
  <text x="255" y="136" text-anchor="middle" font-size="11" fill="#2d6e52">GPIO 35 (ADC1)</text>
  <text x="255" y="151" text-anchor="middle" font-size="11" fill="#2d6e52">0 – 4095 (12 bits)</text>

  <!-- ESP32 -->
  <rect x="335" y="56" width="155" height="108" rx="8"
        fill="#a3dcc4" stroke="#1a7a56" stroke-width="1.2"/>
  <text x="412" y="82"  text-anchor="middle" font-size="13" font-weight="bold" fill="#0d4030">ESP32 DevKit v1</text>
  <text x="412" y="99"  text-anchor="middle" font-size="11" fill="#1a5c42">Lectura ADC (promedio)</text>
  <text x="412" y="114" text-anchor="middle" font-size="11" fill="#1a5c42">Logica de decision</text>
  <text x="412" y="129" text-anchor="middle" font-size="11" fill="#1a5c42">WiFi + MQTT</text>
  <text x="412" y="144" text-anchor="middle" font-size="11" fill="#1a5c42">Control de rele</text>
  <text x="412" y="158" text-anchor="middle" font-size="11" fill="#1a5c42">FreeRTOS / 520 KB RAM</text>

  <!-- Actuador -->
  <rect x="510" y="62" width="120" height="96" rx="8"
        fill="#fcddd5" stroke="#c0452a" stroke-width="0.8"/>
  <text x="570" y="88"  text-anchor="middle" font-size="13" font-weight="bold" fill="#7a2010">Actuador</text>
  <text x="570" y="106" text-anchor="middle" font-size="11" fill="#9e3520">Rele 5V (1 canal)</text>
  <text x="570" y="121" text-anchor="middle" font-size="11" fill="#9e3520">Bomba de agua</text>
  <text x="570" y="136" text-anchor="middle" font-size="11" fill="#9e3520">GPIO 26 (salida)</text>
  <text x="570" y="151" text-anchor="middle" font-size="11" fill="#9e3520">Activo en LOW</text>

  <!-- Arrows hardware layer -->
  <line x1="175" y1="110" x2="193" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="315" y1="110" x2="333" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="110" x2="508" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="496" y="105" text-anchor="middle" font-size="10" fill="#555">Señal</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- CLOUD LAYER                                             -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="30" y="215" width="620" height="130" rx="14"
        fill="#e3f0fb" stroke="#1a6fa8" stroke-width="1"/>
  <text x="50" y="243" font-size="13" font-weight="bold" fill="#0d4475">Cloud layer</text>

  <!-- MQTT Broker -->
  <rect x="55" y="258" width="165" height="66" rx="8"
        fill="#b8d9f4" stroke="#1a6fa8" stroke-width="0.8"/>
  <text x="137" y="281" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d3d6b">MQTT broker</text>
  <text x="137" y="298" text-anchor="middle" font-size="11" fill="#1a5494">HiveMQ Cloud</text>
  <text x="137" y="313" text-anchor="middle" font-size="11" fill="#1a5494">QoS 0 / QoS 1</text>

  <!-- Firebase -->
  <rect x="258" y="258" width="165" height="66" rx="8"
        fill="#b8d9f4" stroke="#1a6fa8" stroke-width="0.8"/>
  <text x="340" y="281" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d3d6b">Firebase</text>
  <text x="340" y="298" text-anchor="middle" font-size="11" fill="#1a5494">Realtime Database</text>
  <text x="340" y="313" text-anchor="middle" font-size="11" fill="#1a5494">Historial de lecturas</text>

  <!-- Cloud Functions -->
  <rect x="461" y="258" width="165" height="66" rx="8"
        fill="#b8d9f4" stroke="#1a6fa8" stroke-width="0.8"/>
  <text x="543" y="281" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d3d6b">Cloud Functions</text>
  <text x="543" y="298" text-anchor="middle" font-size="11" fill="#1a5494">Logica de alertas</text>
  <text x="543" y="313" text-anchor="middle" font-size="11" fill="#1a5494">Envio FCM</text>

  <!-- Arrows cloud layer -->
  <line x1="220" y1="291" x2="256" y2="291" stroke="#1a6fa8" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="423" y1="291" x2="459" y2="291" stroke="#1a6fa8" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Arrow hardware -> cloud (WiFi/MQTT) -->
  <line x1="412" y1="164" x2="412" y2="213" stroke="#1a6fa8" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="418" y="193" font-size="11" fill="#1a6fa8">WiFi / MQTT</text>

  <!-- Arrow cloud -> hardware (remote command) -->
  <path d="M258 258 Q225 235 258 215" fill="none" stroke="#c0452a" stroke-width="1.2" marker-end="url(#arrow)" stroke-dasharray="5 3"/>
  <text x="195" y="240" font-size="10" fill="#c0452a">Cmd remoto</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- USER LAYER                                              -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="30" y="380" width="620" height="120" rx="14"
        fill="#eeebfe" stroke="#5b4abf" stroke-width="1"/>
  <text x="50" y="408" font-size="13" font-weight="bold" fill="#2e2475">User layer</text>

  <!-- Dashboard -->
  <rect x="55" y="420" width="160" height="60" rx="8"
        fill="#cfc9f6" stroke="#5b4abf" stroke-width="0.8"/>
  <text x="135" y="443" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e2475">Dashboard web</text>
  <text x="135" y="461" text-anchor="middle" font-size="11" fill="#4035a0">React + Chart.js</text>
  <text x="135" y="476" text-anchor="middle" font-size="11" fill="#4035a0">Control manual bomba</text>

  <!-- Notifications -->
  <rect x="260" y="420" width="160" height="60" rx="8"
        fill="#cfc9f6" stroke="#5b4abf" stroke-width="0.8"/>
  <text x="340" y="443" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e2475">Notificaciones</text>
  <text x="340" y="461" text-anchor="middle" font-size="11" fill="#4035a0">Firebase Cloud Msg.</text>
  <text x="340" y="476" text-anchor="middle" font-size="11" fill="#4035a0">Push / correo</text>

  <!-- Mobile app -->
  <rect x="465" y="420" width="160" height="60" rx="8"
        fill="#e2dffc" stroke="#8a80cc" stroke-width="0.8" stroke-dasharray="6 3"/>
  <text x="545" y="443" text-anchor="middle" font-size="13" font-weight="bold" fill="#5b4abf">App movil</text>
  <text x="545" y="461" text-anchor="middle" font-size="11" fill="#7060b5">Nice to have</text>
  <text x="545" y="476" text-anchor="middle" font-size="11" fill="#7060b5">Post-MVP</text>

  <!-- Arrow cloud -> user -->
  <line x1="340" y1="345" x2="340" y2="378" stroke="#5b4abf" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="346" y="366" font-size="11" fill="#5b4abf">HTTPS / WebSocket</text>

</svg>
